<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마스터 프롬프트 빌더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f0f13;
  --surface: #17171f;
  --surface2: #1e1e28;
  --border: #2a2a38;
  --accent: #7c6af7;
  --accent2: #f7a26a;
  --text: #e8e8f0;
  --text-dim: #7878a0;
  --user-bubble: #1e2a1e;
  --user-border: #2d4a2d;
  --ai-bubble: #1a1a28;
  --ai-border: #2a2a42;
  --green: #4ade80;
  --radius: 16px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header ── */
.header {
  width: 100%;
  max-width: 720px;
  padding: 32px 24px 0;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.logo {
  font-family: 'Noto Serif KR', serif;
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 12px; color: var(--text-dim); margin-top: 2px; letter-spacing: 0.1em; }
.api-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-dim);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 6px 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.api-badge:hover { border-color: var(--accent); color: var(--accent); }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); }
.dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* ── API Key Modal ── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  width: 90%;
  max-width: 420px;
}
.modal h3 { font-family: 'Noto Serif KR', serif; font-size: 18px; margin-bottom: 8px; }
.modal p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.6; }
.modal input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  color: var(--text);
  font-size: 14px;
  font-family: monospace;
  margin-bottom: 12px;
}
.modal input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; }
.modal-btns button {
  flex: 1; padding: 11px;
  border: none; border-radius: 8px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; transition: 0.2s;
}
.btn-save { background: var(--accent); color: white; }
.btn-save:hover { opacity: 0.85; }
.btn-cancel { background: var(--surface2); color: var(--text-dim); }

/* ── Chat area ── */
.chat-wrap {
  width: 100%;
  max-width: 720px;
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
  min-height: 0;
}

.bubble-row {
  display: flex;
  gap: 12px;
  animation: fadeUp 0.3s ease;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.bubble-row.user { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 2px;
}
.avatar.ai { background: linear-gradient(135deg, var(--accent), #a78bfa); }
.avatar.user { background: var(--surface2); border: 1px solid var(--border); }

.bubble {
  max-width: 80%;
  padding: 14px 18px;
  border-radius: 14px;
  font-size: 15px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
}
.bubble.ai {
  background: var(--ai-bubble);
  border: 1px solid var(--ai-border);
  border-top-left-radius: 4px;
}
.bubble.user {
  background: var(--user-bubble);
  border: 1px solid var(--user-border);
  border-top-right-radius: 4px;
  color: #c8e6c9;
}

/* 타이핑 인디케이터 */
.typing {
  display: flex; gap: 5px; align-items: center;
  padding: 14px 18px;
  background: var(--ai-bubble);
  border: 1px solid var(--ai-border);
  border-radius: 14px;
  border-top-left-radius: 4px;
}
.typing span {
  width: 7px; height: 7px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
  40% { transform: translateY(-6px); opacity: 1; }
}

/* ── 결과 프롬프트 박스 ── */
.result-wrap {
  background: var(--surface2);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  padding: 20px;
  margin-top: 4px;
}
.result-label {
  font-size: 11px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  font-weight: 500;
}
.result-text {
  font-size: 13px;
  line-height: 1.8;
  color: var(--text);
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 320px;
  overflow-y: auto;
}
.result-actions { display: flex; gap: 8px; margin-top: 14px; }
.result-actions button {
  padding: 9px 18px;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  cursor: pointer; transition: 0.2s;
  font-family: 'DM Sans', sans-serif;
}
.btn-copy { background: var(--accent); color: white; }
.btn-copy:hover { opacity: 0.85; }
.btn-dl { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
.btn-dl:hover { border-color: var(--accent2); color: var(--accent2); }
.btn-new { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); }
.btn-new:hover { border-color: var(--green); color: var(--green); }

/* ── Input bar ── */
.input-bar {
  width: 100%;
  max-width: 720px;
  padding: 0 24px 28px;
}
.input-inner {
  display: flex;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  transition: border-color 0.2s;
}
.input-inner:focus-within { border-color: var(--accent); }
textarea#userInput {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  resize: none;
  font-size: 15px;
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  line-height: 1.5;
  min-height: 24px;
  max-height: 120px;
}
textarea#userInput::placeholder { color: var(--text-dim); }
.send-btn {
  width: 38px; height: 38px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  align-self: flex-end;
  transition: opacity 0.2s;
}
.send-btn:hover { opacity: 0.85; }
.send-btn:disabled { opacity: 0.3; cursor: default; }
.send-btn svg { width: 18px; height: 18px; fill: white; }
.input-hint { font-size: 12px; color: var(--text-dim); margin-top: 8px; text-align: center; }

/* ── Toast ── */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 10px 20px;
  border-radius: 99px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── No API state ── */
.no-api-msg {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-dim);
  font-size: 14px;
  line-height: 1.8;
}
.no-api-msg strong { color: var(--accent2); }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div>
    <div class="logo">마스터 프롬프트 빌더</div>
    <div class="logo-sub">AI와 대화로 완성하는 프로젝트 페르소나</div>
  </div>
  <div class="api-badge" onclick="openModal()">
    <div class="dot" id="apiDot"></div>
    <span id="apiStatus">API 키 설정</span>
  </div>
</div>

<!-- Chat -->
<div class="chat-wrap" id="chatWrap"></div>

<!-- Input -->
<div class="input-bar">
  <div class="input-inner">
    <textarea id="userInput" rows="1" placeholder="여기에 입력하세요... (Shift+Enter로 줄바꿈)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter로 전송 · Shift+Enter로 줄바꿈</div>
</div>

<!-- API Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>Anthropic API 키</h3>
    <p>대화형 페르소나 생성을 위해 API 키가 필요해요.<br>키는 브라우저에만 저장되며 외부로 전송되지 않아요.</p>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." />
    <div class="modal-btns">
      <button class="btn-save" onclick="saveKey()">저장하기</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let apiKey = localStorage.getItem('mpb_key') || '';
let history = []; // {role, content}
let isLoading = false;
let promptGenerated = false;

// ── System Prompt ──
const SYSTEM = `당신은 사용자가 AI 채팅에서 사용할 "마스터 프롬프트"를 만들어주는 전문 도우미입니다.

목표: 사용자와 자연스러운 대화를 나누면서 아래 핵심 정보를 파악하고, 최적의 마스터 프롬프트를 생성하는 것입니다.

파악해야 할 핵심 정보:
1. 프로젝트가 무엇인지 (어떤 일인지)
2. 언제, 무엇이 되면 끝나는지 (완료 조건)
3. 지금 어느 단계인지 (시작 전 / 진행 중 / 막힌 상태)
4. AI에게 어떤 역할을 맡기고 싶은지
5. 최종 결과물이 어떤 형태인지
6. AI가 알아야 할 배경 맥락

대화 원칙:
- 절대 여러 질문을 한꺼번에 하지 마세요. 반드시 하나씩만 물어보세요.
- 전문 용어를 쓰지 말고, 일상 대화처럼 편하게 물어보세요.
- 사용자의 답변에서 단서를 포착해 다음 질문을 자연스럽게 이어가세요.
- 사용자가 잘 모르거나 막혀있으면 예시를 들어 유도하세요.
- 5~8번의 대화로 충분히 파악되면 마스터 프롬프트를 생성하세요.

마스터 프롬프트 생성 시:
- 충분히 파악됐다고 판단되면 "이제 마스터 프롬프트를 만들어드릴게요!" 라고 말하고
- 반드시 아래 형식으로 출력하세요:

===PROMPT_START===
(여기에 완성된 마스터 프롬프트 전문)
===PROMPT_END===

마스터 프롬프트는:
- 자연스러운 문단 형태로 작성
- "당신은 ~" 으로 시작
- 역할, 목표, 완료조건, 방식, 결과물형태, 필요시 AI협업 원칙 포함
- 해당 프로젝트에 즉시 쓸 수 있을 만큼 구체적으로

첫 메시지는 반드시 이것으로 시작하세요:
"안녕하세요! 지금 만들려는 마스터 프롬프트로 AI에게 맡길 프로젝트가 어떤 건가요? 편하게 말씀해 주세요 😊"`;

// ── Init ──
updateApiStatus();
startConversation();

function updateApiStatus() {
  const dot = document.getElementById('apiDot');
  const status = document.getElementById('apiStatus');
  if (apiKey) {
    dot.classList.add('on');
    status.textContent = 'API 연결됨';
  } else {
    dot.classList.remove('on');
    status.textContent = 'API 키 설정';
  }
}

async function startConversation() {
  if (!apiKey) {
    addBubble('ai', '안녕하세요! 지금 만들려는 마스터 프롬프트로 AI에게 맡길 프로젝트가 어떤 건가요? 편하게 말씀해 주세요 😊\n\n⚠️ 대화를 시작하려면 상단의 "API 키 설정"을 먼저 눌러주세요.');
    return;
  }
  showTyping();
  const reply = await callClaude([]);
  hideTyping();
  if (reply) {
    addBubble('ai', reply);
    history.push({ role: 'assistant', content: reply });
  }
}

// ── Send ──
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  if (!apiKey) {
    openModal();
    return;
  }

  input.value = '';
  autoResize(input);
  addBubble('user', text);
  history.push({ role: 'user', content: text });

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const reply = await callClaude(history);
  hideTyping();
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;

  if (reply) {
    // 프롬프트 추출
    const match = reply.match(/===PROMPT_START===([\s\S]*?)===PROMPT_END===/);
    if (match) {
      const cleanReply = reply.replace(/===PROMPT_START===[\s\S]*?===PROMPT_END===/, '').trim();
      if (cleanReply) addBubble('ai', cleanReply);
      showResult(match[1].trim());
      promptGenerated = true;
    } else {
      addBubble('ai', reply);
    }
    history.push({ role: 'assistant', content: reply });
  }
}

// ── Claude API ──
async function callClaude(msgs) {
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: SYSTEM,
        messages: msgs.length === 0
          ? [{ role: 'user', content: '시작해줘' }]
          : msgs
      })
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('API 오류: ' + (err.error?.message || res.status));
      return null;
    }
    const data = await res.json();
    return data.content?.[0]?.text || null;
  } catch (e) {
    showToast('네트워크 오류가 발생했어요');
    return null;
  }
}

// ── UI helpers ──
function addBubble(role, text) {
  const wrap = document.getElementById('chatWrap');
  const row = document.createElement('div');
  row.className = 'bubble-row ' + role;

  const avatar = document.createElement('div');
  avatar.className = 'avatar ' + role;
  avatar.textContent = role === 'ai' ? '✦' : '나';

  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;

  row.appendChild(avatar);
  row.appendChild(bubble);
  wrap.appendChild(row);
  scrollBottom();
}

let typingEl = null;
function showTyping() {
  const wrap = document.getElementById('chatWrap');
  const row = document.createElement('div');
  row.className = 'bubble-row ai';
  row.id = 'typingRow';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '✦';

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';

  row.appendChild(avatar);
  row.appendChild(typing);
  wrap.appendChild(row);
  typingEl = row;
  scrollBottom();
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function showResult(promptText) {
  const wrap = document.getElementById('chatWrap');
  const row = document.createElement('div');
  row.className = 'bubble-row ai';

  const avatar = document.createElement('div');
  avatar.className = 'avatar ai';
  avatar.textContent = '✦';

  const resultWrap = document.createElement('div');
  resultWrap.className = 'result-wrap';
  resultWrap.innerHTML = `
    <div class="result-label">✓ 마스터 프롬프트 완성</div>
    <div class="result-text">${escHtml(promptText)}</div>
    <div class="result-actions">
      <button class="btn-copy" onclick="copyPrompt(this)">📋 복사하기</button>
      <button class="btn-dl" onclick="downloadTxt(this)">⬇ .txt 저장</button>
      <button class="btn-new" onclick="location.reload()">🔄 새 프로젝트</button>
    </div>
  `;
  resultWrap._promptText = promptText;

  row.appendChild(avatar);
  row.appendChild(resultWrap);
  wrap.appendChild(row);
  scrollBottom();
}

function copyPrompt(btn) {
  const text = btn.closest('.result-wrap')._promptText;
  navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사됐어요!'));
}

function downloadTxt(btn) {
  const text = btn.closest('.result-wrap')._promptText;
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'master_prompt.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollBottom() {
  const wrap = document.getElementById('chatWrap');
  setTimeout(() => wrap.scrollTop = wrap.scrollHeight, 50);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Input auto-resize ──
const userInput = document.getElementById('userInput');
userInput.addEventListener('input', () => autoResize(userInput));
userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Modal ──
function openModal() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('modalBg').classList.add('show');
}
function closeModal() {
  document.getElementById('modalBg').classList.remove('show');
}
function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val.startsWith('sk-ant-')) {
    showToast('올바른 API 키 형식이 아니에요 (sk-ant-로 시작)');
    return;
  }
  apiKey = val;
  localStorage.setItem('mpb_key', apiKey);
  updateApiStatus();
  closeModal();
  showToast('API 키가 저장됐어요!');
  if (document.getElementById('chatWrap').children.length <= 1) {
    document.getElementById('chatWrap').innerHTML = '';
    history = [];
    startConversation();
  }
}
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});
</script>
