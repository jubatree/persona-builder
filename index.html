<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마스터 페르소나 빌더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a2e;
    --ink-light: #4a4a6a;
    --paper: #faf9f6;
    --paper-warm: #f2efe8;
    --accent: #c0392b;
    --accent-soft: rgba(192,57,43,0.08);
    --border: #e0ddd5;
    --green: #27ae60;
    --blue: #2980b9;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
  }
  .header-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -0.02em;
  }

  /* Card */
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  }

  /* Progress */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 12px;
    color: var(--ink-light);
    white-space: nowrap;
    min-width: 48px;
    text-align: right;
  }

  /* Question */
  .q-number {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.5;
    color: var(--ink);
    margin-bottom: 10px;
  }
  .q-hint {
    font-size: 13px;
    color: var(--ink-light);
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .q-hint span {
    display: inline-block;
    background: var(--paper-warm);
    border-radius: 4px;
    padding: 1px 6px;
    margin: 2px 2px;
    font-size: 12px;
  }

  /* Special inputs */
  .choice-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .choice-btn {
    padding: 8px 16px;
    border-radius: 99px;
    border: 1px solid var(--border);
    background: white;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .choice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .choice-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }

  .check-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }
  .check-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: white;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .check-btn:hover { border-color: var(--blue); color: var(--blue); }
  .check-btn.selected { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); font-weight: 500; }

  textarea {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--ink);
    background: var(--paper);
    resize: vertical;
    min-height: 100px;
    line-height: 1.6;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  textarea:focus { outline: none; border-color: var(--accent); background: white; }
  textarea.short { min-height: 60px; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--ink); color: white; }
  .btn-primary:hover { background: #2d2d4e; }
  .btn-skip { background: var(--paper-warm); color: var(--ink-light); flex: 0 0 auto; padding: 13px 20px; }
  .btn-skip:hover { background: var(--border); }

  /* Result */
  .result-card { display: none; }
  .result-card.show { display: block; }
  .wizard-card.hide { display: none; }

  .result-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 6px;
  }
  .result-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
  }
  .result-box {
    background: var(--paper-warm);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
    margin-bottom: 16px;
    max-height: 380px;
    overflow-y: auto;
  }
  .result-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .btn-copy { background: var(--green); color: white; flex: 2; }
  .btn-copy:hover { background: #219a52; }
  .btn-dl { background: var(--blue); color: white; flex: 1; }
  .btn-dl:hover { background: #1f6fa3; }
  .btn-restart { background: var(--paper-warm); color: var(--ink-light); flex: 1; }
  .btn-restart:hover { background: var(--border); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0;
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 14px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="header-label">AI Persona Builder</div>
    <div class="header-title">마스터 페르소나 빌더</div>
  </div>

  <!-- Wizard -->
  <div class="card wizard-card" id="wizardCard">
    <div class="progress-row">
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-label" id="progressLabel">1 / 10</div>
    </div>
    <div class="q-number" id="qNumber">Q1</div>
    <div class="q-text" id="qText"></div>
    <div class="q-hint" id="qHint"></div>
    <div id="inputArea"></div>
    <div class="btn-row" id="btnRow">
      <button class="btn btn-primary" onclick="saveAndNext()">다음 →</button>
      <button class="btn btn-skip" onclick="skipAndNext()">스킵</button>
    </div>
  </div>

  <!-- Result -->
  <div class="card result-card" id="resultCard">
    <div class="result-label">완성된 페르소나 프롬프트</div>
    <div class="result-title">복사해서 AI 채팅창에 붙여넣으세요 ✓</div>
    <div class="result-box" id="resultBox"></div>
    <div class="result-actions">
      <button class="btn btn-copy" onclick="copyPrompt()">📋 복사하기</button>
      <button class="btn btn-dl" onclick="downloadTxt()">⬇ .txt 저장</button>
      <button class="btn btn-restart" onclick="location.reload()">처음부터</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">클립보드에 복사됐어요!</div>

<script>
const questions = [
  {
    id: 'purpose',
    type: 'textarea',
    text: 'AI에게 주로 어떤 일을 맡기고 싶으세요?',
    hint: ['글쓰기·번역', '자료조사·검색', '보고서처럼 정리', '코딩·기술 작업', '아이디어 발굴', '업무 계획·정리', '단순 계산·분석'],
    placeholder: '예) 업무 관련 자료를 정리하고 보고서로 만들어 줬으면 해요.',
    skip: false,
  },
  {
    id: 'duration',
    type: 'choice',
    text: '이 AI를 어떤 방식으로 쓸 예정인가요?',
    hint: [],
    choices: [
      { value: 'long', label: '📁 하나의 목표를 위해 길게 (프로젝트형)' },
      { value: 'short', label: '🔍 그때그때 다양한 질문 (검색 대체형)' },
    ],
    skip: false,
  },
  {
    id: 'role',
    type: 'choice',
    text: 'AI가 어떤 사람처럼 느껴졌으면 하나요?',
    hint: [],
    choices: [
      { value: '비서', label: '🗂 비서' },
      { value: '부하직원', label: '💼 부하직원' },
      { value: '컨설턴트', label: '📊 컨설턴트' },
      { value: '전문가', label: '🎓 전문가' },
      { value: '선배', label: '🤝 선배' },
      { value: '선생님', label: '📚 선생님' },
      { value: '친한 친구', label: '😊 친한 친구' },
      { value: '동료', label: '💬 동료' },
    ],
    skip: true,
  },
  {
    id: 'name',
    type: 'textarea_short',
    text: 'AI가 나를 어떻게 불러줬으면 하나요?',
    hint: ['대표님', '선생님', '이름으로', '그냥 반말로'],
    placeholder: '예) 대표님, 또는 민관님',
    skip: true,
  },
  {
    id: 'tone',
    type: 'choice',
    text: '대화할 때 어떤 말투가 편하세요?',
    hint: [],
    choices: [
      { value: '격식 있고 정중하게', label: '🎩 격식체' },
      { value: '친근하고 편하게', label: '😄 친근하게' },
      { value: '짧고 핵심만', label: '⚡ 핵심만' },
      { value: '단계별로 차근차근', label: '📋 단계별로' },
      { value: '예시를 들어서', label: '💡 예시 중심' },
    ],
    skip: true,
  },
  {
    id: 'forbidden',
    type: 'textarea_short',
    text: 'AI가 절대 하지 않았으면 하는 게 있나요?',
    hint: ['너무 길게 설명', '반말 사용', '딱딱한 말투', '불필요한 칭찬'],
    placeholder: '예) 설명이 너무 길어지는 것, 또는 쓸데없이 칭찬하는 것',
    skip: true,
  },
  {
    id: 'output_format',
    type: 'check',
    text: '결과물은 어떤 형태로 받고 싶으세요?',
    hint: [],
    choices: [
      { value: '텍스트 요약', label: '📝 텍스트 요약' },
      { value: '표·엑셀 형식', label: '📊 표·엑셀' },
      { value: '보고서 문서', label: '📄 보고서·문서' },
      { value: '이미지·디자인', label: '🖼 이미지·디자인' },
      { value: '코드·스크립트', label: '💻 코드' },
      { value: '단계별 지침', label: '📋 단계별 지침' },
      { value: 'PPT 슬라이드', label: '🎞 PPT' },
    ],
    skip: true,
  },
  {
    id: 'multi_ai',
    type: 'choice',
    text: '필요하면 다른 AI(ChatGPT, Gemini 등)도 활용해도 될까요?',
    hint: [],
    choices: [
      { value: 'yes', label: '✅ 네, 최적의 AI를 알아서 골라주세요' },
      { value: 'cross', label: '🔀 네, 교차검증도 필요하면 써주세요' },
      { value: 'no', label: '❌ 아니요, 이 AI만 써주세요' },
    ],
    skip: false,
  },
  {
    id: 'must_include',
    type: 'textarea_short',
    text: '답변에 꼭 포함됐으면 하는 게 있나요?',
    hint: ['출처·근거', '반드시 한국어로', '숫자·데이터 포함', '실행 가능한 조치'],
    placeholder: '예) 항상 출처를 밝혀주세요. 또는 실행 가능한 다음 단계를 제안해주세요.',
    skip: true,
  },
  {
    id: 'extra',
    type: 'textarea',
    text: '그 외에 AI에게 알려주고 싶은 게 있나요?',
    hint: [],
    placeholder: '예) 나는 제조업 종사자야. 전문 용어는 쉽게 풀어서 설명해줘. (없으면 스킵)',
    skip: true,
  },
];

let currentIndex = 0;
let answers = {};
let multiSelected = {};

function renderQuestion() {
  const q = questions[currentIndex];
  const total = questions.length;
  const pct = (currentIndex / total) * 100;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${currentIndex + 1} / ${total}`;
  document.getElementById('qNumber').textContent = `Q${currentIndex + 1}`;
  document.getElementById('qText').textContent = q.text;

  // hint
  const hintEl = document.getElementById('qHint');
  if (q.hint && q.hint.length > 0) {
    hintEl.innerHTML = '예시: ' + q.hint.map(h => `<span>${h}</span>`).join('');
  } else {
    hintEl.innerHTML = '';
  }

  // input area
  const area = document.getElementById('inputArea');
  area.innerHTML = '';
  multiSelected = {};

  if (q.type === 'textarea' || q.type === 'textarea_short') {
    const ta = document.createElement('textarea');
    ta.id = 'mainInput';
    ta.placeholder = q.placeholder || '';
    if (q.type === 'textarea_short') ta.classList.add('short');
    if (answers[q.id]) ta.value = answers[q.id];
    ta.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) saveAndNext(); });
    area.appendChild(ta);

  } else if (q.type === 'choice') {
    const grid = document.createElement('div');
    grid.className = 'choice-grid';
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn' + (answers[q.id] === c.value ? ' selected' : '');
      btn.textContent = c.label;
      btn.onclick = () => {
        grid.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        answers[q.id] = c.value;
      };
      grid.appendChild(btn);
    });
    area.appendChild(grid);

  } else if (q.type === 'check') {
    const grid = document.createElement('div');
    grid.className = 'check-grid';
    const saved = answers[q.id] ? answers[q.id].split(', ') : [];
    q.choices.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'check-btn' + (saved.includes(c.value) ? ' selected' : '');
      if (saved.includes(c.value)) multiSelected[c.value] = true;
      btn.textContent = c.label;
      btn.onclick = () => {
        if (multiSelected[c.value]) {
          delete multiSelected[c.value];
          btn.classList.remove('selected');
        } else {
          multiSelected[c.value] = true;
          btn.classList.add('selected');
        }
        answers[q.id] = Object.keys(multiSelected).join(', ');
      };
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  }

  // skip button
  const skipBtn = document.getElementById('btnRow').querySelector('.btn-skip');
  skipBtn.style.display = q.skip ? '' : 'none';
}

function getValue() {
  const q = questions[currentIndex];
  if (q.type === 'textarea' || q.type === 'textarea_short') {
    return document.getElementById('mainInput')?.value.trim() || '';
  } else if (q.type === 'choice') {
    return answers[q.id] || '';
  } else if (q.type === 'check') {
    return answers[q.id] || '';
  }
  return '';
}

function saveAndNext() {
  const q = questions[currentIndex];
  const val = getValue();
  if (val) answers[q.id] = val;
  advance();
}

function skipAndNext() {
  advance();
}

function advance() {
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    generatePrompt();
  }
}

function generatePrompt() {
  document.getElementById('wizardCard').classList.add('hide');
  const rc = document.getElementById('resultCard');
  rc.classList.add('show');

  const a = answers;
  const isLong = a.duration === 'long';
  const lines = [];

  lines.push('당신은 다음의 역할과 원칙을 완벽히 숙지하고 그에 따라 행동해야 합니다.\n');

  // 역할/페르소나
  let roleDesc = '';
  if (a.role) roleDesc += `${a.role}`;
  if (a.purpose) {
    lines.push(`[역할과 목적]\n당신은 사용자의 ${roleDesc ? roleDesc + '로서, ' : ''}${a.purpose} 역할을 수행합니다.`);
  } else if (roleDesc) {
    lines.push(`[역할]\n당신은 사용자의 ${roleDesc}입니다.`);
  }

  // 호칭
  if (a.name) {
    lines.push(`\n[호칭]\n사용자를 항상 "${a.name}"(으)로 부르십시오.`);
  }

  // 말투
  if (a.tone) {
    lines.push(`\n[말투와 태도]\n대화 시 ${a.tone} 방식으로 응답하십시오.`);
  }

  // 금지
  if (a.forbidden) {
    lines.push(`\n[금지 사항]\n다음은 절대 하지 마십시오: ${a.forbidden}`);
  }

  // 결과물 형식
  if (a.output_format) {
    lines.push(`\n[결과물 형식]\n사용자가 원하는 결과물 형태는 "${a.output_format}"입니다. 답변 방식과 도구 선택 시 이를 반드시 고려하십시오.`);
  }

  // 필수 포함 요소
  if (a.must_include) {
    lines.push(`\n[답변 필수 요소]\n모든 답변에 반드시 포함할 것: ${a.must_include}`);
  }

  // 프로젝트 유형
  if (isLong) {
    lines.push(`\n[진행 방식 — 장기 프로젝트형]\n모든 대화는 하나의 공통 목표를 향해 누적됩니다. 이전 맥락을 연결하여 과정 중심으로 답변하고, 각 답변이 목표 달성의 단계가 되도록 하십시오.`);
  } else {
    lines.push(`\n[진행 방식 — 단기·독립 질문형]\n각 질문은 독립적으로 처리합니다. 이전 질문과 불필요하게 연결 짓지 말고, 간결하고 직접적으로 답변하십시오.`);
  }

  // 다른 AI 활용
  if (a.multi_ai === 'yes') {
    lines.push(`\n[AI 협업 원칙]\n답변 중 외부 정보 검색, 이미지 생성, 데이터 분석, 코드 실행 등 특정 기능이 필요한 경우, 현시점에서 해당 기능을 가장 잘 수행할 수 있는 AI를 선택하여 결과를 받아 통합하십시오.`);
  } else if (a.multi_ai === 'cross') {
    lines.push(`\n[AI 협업 원칙 — 교차검증 포함]\n필요 시 현시점에서 해당 기능을 가장 잘 수행할 수 있는 AI를 선택하고, 신뢰도가 중요한 경우에는 복수의 AI에게 결과를 받아 교차검증 후 통합하여 답변하십시오.`);
  }

  // 추가 정보
  if (a.extra) {
    lines.push(`\n[추가 참고 사항]\n${a.extra}`);
  }

  const prompt = lines.join('\n');
  document.getElementById('resultBox').textContent = prompt;
  window._generatedPrompt = prompt;
}

function copyPrompt() {
  const text = window._generatedPrompt || '';
  navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사됐어요!'));
}

function downloadTxt() {
  const text = window._generatedPrompt || '';
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'persona_prompt.txt';
  a.click();
  URL.revokeObjectURL(url);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderQuestion();
</script>
</body>
</html>
